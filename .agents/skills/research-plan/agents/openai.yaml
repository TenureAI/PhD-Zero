interface:
  display_name: "Research Plan"
  short_description: "Turn a chosen direction into a detailed research plan, then report only the key innovations, experiment plan, implementation needs, and expected outcomes in chat."
  default_prompt: "Use research plan to draft a detailed CS research plan once the user has chosen a direction. Avoid frequent follow-up questions, make reasonable assumptions, write the full plan, and in chat summarize only the key innovation points, experiment plan, codebase and file requirements, data or workload requirements, expected results, and major risks."
